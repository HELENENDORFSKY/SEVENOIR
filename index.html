<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sevenoir - Identity Layer for the Physical World</title>
    <meta name="description" content="Precision infrastructure for airlines, airports, and global logistics." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: {
                DEFAULT: '#686a6c', // Correct Nardo Grey
                light: '#F8FAFC', // Fallback
                dark: '#686a6c', // Correct Nardo Grey
              },
              primary: {
                DEFAULT: '#FFFFFF', 
                dim: '#E5E7EB', // Lighter gray for better visibility
              },
              accent: {
                DEFAULT: '#F3F4F6', // Lighter Silver
                metallic: '#D1D5DB',
              },
              surface: {
                DEFAULT: '#797d81', // Slightly lighter than base
                dark: '#575b5f', // Slightly darker than base
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            backgroundImage: {
              'metallic-gradient': 'linear-gradient(135deg, #E0E0E0 0%, #808080 50%, #E0E0E0 100%)',
              'metallic-text': 'linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%)',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #686a6c;
        color: #FFFFFF;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #686a6c;
      }
      ::-webkit-scrollbar-thumb {
        background: #575b5f;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3A3E42;
      }
      
      .text-metallic {
        background: linear-gradient(180deg, #FFFFFF 20%, #9CA3AF 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }

      .silver-border {
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
    </style>

  }
}
</script>
